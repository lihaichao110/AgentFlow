name: Docker 打包构建发布

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取 GitHub 上的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 登录 Docker 镜像仓库（以 Docker Hub 为例）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}  # GitHub 密钥里的用户名
          password: ${{ secrets.DOCKER_HUB_TOKEN }}     # GitHub 密钥里的令牌

      # 3. 设置日期
      - name: Set current date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      # 4. 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            lihaichao110/agentflow:latest
            lihaichao110/agentflow:${{ github.sha }}
            lihaichao110/agentflow:${{ steps.date.outputs.date }}
          
