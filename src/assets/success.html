<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运行中 - AgentFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0a0a0f 100%);
      font-family: 'SF Pro Display', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 网格背景 */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 1;
    }

    /* 扫描线 */
    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
      animation: scan 3s linear infinite;
      z-index: 5;
      pointer-events: none;
    }

    @keyframes scan {
      0% { top: -2px; }
      100% { top: 100%; }
    }

    /* 噪点效果 */
    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* 粒子容器 */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 212, 255, 0.8);
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(0, 212, 255, 0.8);
      animation: float-particle 8s infinite;
    }

    @keyframes float-particle {
      0%, 100% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        transform: translateY(-100vh) translateX(20px);
        opacity: 0;
      }
    }

    /* 边框光线 */
    .corner-light {
      position: fixed;
      width: 150px;
      height: 150px;
      pointer-events: none;
      z-index: 3;
    }

    .corner-light::before,
    .corner-light::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: rgba(0, 212, 255, 0.5);
      border-style: solid;
    }

    .corner-light.top-left {
      top: 20px;
      left: 20px;
    }
    .corner-light.top-left::before {
      top: 0; left: 0;
      border-width: 2px 0 0 2px;
    }
    .corner-light.top-left::after {
      top: 0; left: 0;
      width: 60px;
      height: 60px;
      border-width: 1px 0 0 1px;
      animation: corner-pulse 2s ease-in-out infinite;
    }

    .corner-light.top-right {
      top: 20px;
      right: 20px;
    }
    .corner-light.top-right::before {
      top: 0; right: 0;
      border-width: 2px 2px 0 0;
    }
    .corner-light.top-right::after {
      top: 0; right: 0;
      width: 60px;
      height: 60px;
      border-width: 1px 1px 0 0;
      animation: corner-pulse 2s ease-in-out infinite 0.5s;
    }

    .corner-light.bottom-left {
      bottom: 20px;
      left: 20px;
    }
    .corner-light.bottom-left::before {
      bottom: 0; left: 0;
      border-width: 0 0 2px 2px;
    }
    .corner-light.bottom-left::after {
      bottom: 0; left: 0;
      width: 60px;
      height: 60px;
      border-width: 0 0 1px 1px;
      animation: corner-pulse 2s ease-in-out infinite 1s;
    }

    .corner-light.bottom-right {
      bottom: 20px;
      right: 20px;
    }
    .corner-light.bottom-right::before {
      bottom: 0; right: 0;
      border-width: 0 2px 2px 0;
    }
    .corner-light.bottom-right::after {
      bottom: 0; right: 0;
      width: 60px;
      height: 60px;
      border-width: 0 1px 1px 0;
      animation: corner-pulse 2s ease-in-out infinite 1.5s;
    }

    @keyframes corner-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* 发光球体 */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb.top {
      top: -300px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #00d4ff 0%, transparent 70%);
      animation: pulse-glow 4s ease-in-out infinite;
    }

    .glow-orb.bottom {
      bottom: -400px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, #00ff88 0%, transparent 70%);
      opacity: 0.2;
      animation: pulse-glow 4s ease-in-out infinite 2s;
    }

    .glow-orb.left {
      left: -200px;
      top: 50%;
      transform: translateY(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #ff00ff 0%, transparent 70%);
      opacity: 0.15;
      animation: pulse-glow 5s ease-in-out infinite 1s;
    }

    .glow-orb.right {
      right: -200px;
      top: 50%;
      transform: translateY(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #00d4ff 0%, transparent 70%);
      opacity: 0.15;
      animation: pulse-glow 5s ease-in-out infinite 3s;
    }

    @keyframes pulse-glow {
      0%, 100% {
        opacity: 0.3;
        transform: translateX(-50%) scale(1);
      }
      50% {
        opacity: 0.5;
        transform: translateX(-50%) scale(1.1);
      }
    }

    @keyframes pulse-glow-vertical {
      0%, 100% {
        opacity: 0.1;
        transform: translateY(-50%) scale(1);
      }
      50% {
        opacity: 0.25;
        transform: translateY(-50%) scale(1.15);
      }
    }

    /* 主容器 */
    .container {
      text-align: center;
      position: relative;
      z-index: 10;
      padding: 0 20px;
    }

    /* HUD 边框 */
    .hud-frame {
      position: relative;
      padding: 60px 80px;
      background: rgba(0, 20, 40, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 4px;
      backdrop-filter: blur(10px);
    }

    .hud-frame::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.8), transparent);
    }

    .hud-frame::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.8), transparent);
    }

    /* 顶部装饰线 */
    .deco-line {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .deco-line::before,
    .deco-line::after {
      content: '';
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.6));
    }

    .deco-line::after {
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.6), transparent);
    }

    .deco-dot {
      width: 6px;
      height: 6px;
      background: #00d4ff;
      border-radius: 50%;
      box-shadow: 0 0 10px #00d4ff;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 成功图标 */
    .success-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 40px;
      position: relative;
    }

    .success-icon .hexagon {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: rotate-hex 20s linear infinite;
    }

    .success-icon .hexagon svg {
      width: 100%;
      height: 100%;
    }

    @keyframes rotate-hex {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .success-icon .ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #00d4ff;
      border-right-color: #00d4ff;
      animation: spin 2s linear infinite;
    }

    .success-icon .ring.inner {
      width: 75%;
      height: 75%;
      top: 12.5%;
      left: 12.5%;
      border-top-color: #00ff88;
      border-right-color: #00ff88;
      animation-direction: reverse;
      animation-duration: 1.5s;
    }

    .success-icon .ring.inner-2 {
      width: 50%;
      height: 50%;
      top: 25%;
      left: 25%;
      border-bottom-color: #00d4ff;
      border-left-color: #00d4ff;
      animation-duration: 1s;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .success-icon .check {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      z-index: 10;
    }

    .success-icon .check::before {
      content: '';
      position: absolute;
      left: 2px;
      top: 22px;
      width: 16px;
      height: 5px;
      background: #00ff88;
      transform: rotate(45deg);
      border-radius: 3px;
      box-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
      animation: check-glow 1.5s ease-in-out infinite;
    }

    .success-icon .check::after {
      content: '';
      position: absolute;
      left: 14px;
      top: 14px;
      width: 26px;
      height: 5px;
      background: #00ff88;
      transform: rotate(-45deg);
      border-radius: 3px;
      box-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
      animation: check-glow 1.5s ease-in-out infinite;
    }

    @keyframes check-glow {
      0%, 100% { 
        box-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
        filter: brightness(1);
      }
      50% { 
        box-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88, 0 0 80px #00ff88;
        filter: brightness(1.2);
      }
    }

    /* 标题 */
    .title {
      font-size: 52px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff 0%, #00ff88 50%, #00d4ff 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: 10px;
      animation: gradient-shift 3s ease infinite;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 50px;
      position: relative;
      display: inline-block;
    }

    .subtitle::before,
    .subtitle::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.4));
    }

    .subtitle::before {
      right: 100%;
      margin-right: 15px;
    }

    .subtitle::after {
      left: 100%;
      margin-left: 15px;
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.4), transparent);
    }

    /* 数据流动画 */
    .data-flow {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      font-size: 10px;
      color: rgba(0, 212, 255, 0.4);
      font-family: monospace;
      letter-spacing: 2px;
    }

    .data-flow span {
      animation: data-glitch 3s infinite;
    }

    .data-flow span:nth-child(2) { animation-delay: 0.5s; }
    .data-flow span:nth-child(3) { animation-delay: 1s; }
    .data-flow span:nth-child(4) { animation-delay: 1.5s; }

    @keyframes data-glitch {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* 统计面板 */
    .stats {
      display: flex;
      justify-content: center;
      gap: 60px;
    }

    .stat-item {
      text-align: center;
      position: relative;
      padding: 15px 25px;
      background: rgba(0, 212, 255, 0.03);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .stat-item:hover {
      background: rgba(0, 212, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.3);
      transform: translateY(-2px);
    }

    .stat-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .stat-item:hover::before {
      opacity: 1;
    }

    .stat-item::after {
      content: '';
      position: absolute;
      right: -31px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, transparent, rgba(0, 212, 255, 0.15), transparent);
    }

    .stat-item:last-child::after {
      display: none;
    }

    .stat-value {
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .stat-value.status {
      color: #00ff88;
      text-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
      position: relative;
    }

    .stat-value.status::after {
      content: '';
      position: absolute;
      top: 50%;
      right: -20px;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse-dot 1s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { 
        box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7);
      }
      50% { 
        box-shadow: 0 0 0 8px rgba(0, 255, 136, 0);
      }
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    /* 底部装饰 */
    .footer-deco {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .footer-deco .line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3));
    }

    .footer-deco .line:last-child {
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.3), transparent);
    }
  </style>
</head>
<body>
  <!-- 背景效果层 -->
  <div class="grid-bg"></div>
  <div class="scanline"></div>
  <div class="noise"></div>
  <div class="particles" id="particles"></div>

  <!-- 角落装饰 -->
  <div class="corner-light top-left"></div>
  <div class="corner-light top-right"></div>
  <div class="corner-light bottom-left"></div>
  <div class="corner-light bottom-right"></div>

  <!-- 发光球体 -->
  <div class="glow-orb top"></div>
  <div class="glow-orb bottom"></div>
  <div class="glow-orb left"></div>
  <div class="glow-orb right"></div>

  <!-- 主内容 -->
  <div class="container">
    <div class="hud-frame">
      <div class="deco-line">
        <div class="deco-dot"></div>
      </div>
      
      <div class="success-icon">
        <div class="hexagon">
          <svg viewBox="0 0 100 100">
            <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" 
                     fill="none" 
                     stroke="rgba(0,212,255,0.3)" 
                     stroke-width="0.5"
                     stroke-dasharray="4,4"/>
          </svg>
        </div>
        <div class="ring"></div>
        <div class="ring inner"></div>
        <div class="ring inner-2"></div>
        <div class="check"></div>
      </div>
      
<h1 class="title">运行中</h1>
    <p class="subtitle">Online & Healthy</p>
      
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value status">200</div>
          <div class="stat-label">Status</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">54ms</div>
          <div class="stat-label">Latency</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">China</div>
          <div class="stat-label">Region</div>
        </div>
      </div>

      <div class="data-flow">
        <span>0x7F3A</span>
        <span>0xE2B9</span>
        <span>0x4C1D</span>
        <span>0x9F6E</span>
      </div>
    </div>
  </div>

  <div class="footer-deco">
    <div class="line"></div>
    <span>AgentFlow</span>
    <div class="line"></div>
  </div>

  <script>
    // 创建粒子
    const particlesContainer = document.getElementById('particles');
    const particleCount = 50;

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
      
      // 随机颜色
      const colors = ['rgba(0, 212, 255, 0.8)', 'rgba(0, 255, 136, 0.8)', 'rgba(255, 0, 255, 0.5)'];
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      particle.style.background = randomColor;
      particle.style.boxShadow = `0 0 6px ${randomColor}`;
      
      particlesContainer.appendChild(particle);
    }
  </script>
</body>
</html>
